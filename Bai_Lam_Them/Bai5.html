<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Bài 5: Radio Button</title>
</head>

<body>

    <h4>Chọn cỡ ly kem của bạn:</h4>
    <input type="radio" value="Lớn" name="co" checked />Lớn<br />
    <input type="radio" value="Vừa" name="co" />Vừa<br />
    <input type="radio" value="Nhỏ" name="co" />Nhỏ<br />

    <br />
    <button onclick="chonco()">Chọn cỡ</button>
    <hr>

    <h4 id="coKemDaChon" style="color: green;"></h4>

    <script>
        function chonco() {
            let size = "";
            let arr = document.getElementsByName("co");

            for (let i = 0; i < arr.length; i++) {
                if (arr[i].checked) {
                    size = arr[i].value;
                    break;
                }
            }
            let str = "Kích thước bạn đã chọn là: " + size;
            document.getElementById("coKemDaChon").innerHTML = str;
        }
    </script>

</body>

</html>
