<!-- 
Bài tập JavaScript 22: Tạo một nút có value = "Gửi", textbox có name = "HoTen", 2 nút radio có tên là GioiTinh và nhãn tương ứng là Nam, nữ.

Yêu cầu: Khi người dùng di chuyển chuột vào phần tử nào thì hiển thị thông báo tương ứng dưới thanh trạng thái. 
Ví dụ nếu người sử dụng di chuyển chuột qua nút nhấn "Gửi" thì thanh trạng thái sẽ là "Bạn đang di chuyển chuột vào nút"...

Hướng dẫn: Khi người dùng di chuyển chuột thì sự kiện di chuyển chuột sẽ xuất hiện, sự kiện này có tên là : onMoseMove. Vậy ta sẽ viết lệnh trong sự kiện này. 
-->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xử lý sự kiện chuột</title>
</head>

<body style="font-family: arial;">

    <input type="button" value="Gửi" onmousemove="hienThiTrangThai('Chuột đang ở trong nút Gửi');">

    <input type="text" onmousemove="hienThiTrangThai('Chuột đang ở trong textbox');" placeholder="Nhập dữ liệu">
    <br><br>

    <label>
        <input type="radio" id="Nam" onmousemove="hienThiTrangThai('Chuột đang ở ô Nam');">Nam
    </label>
    <label>
        <input type="radio" id="Nữ" onmousemove="hienThiTrangThai('Chuột đang ở ô Nữ');">Nữ
    </label>
    <br><br><br>
    <script>
        function hienThiTrangThai(noiDung) {
            document.getElementById('ThanhTrangThai').innerText = noiDung;
        }
    </script>
</body>

</html>
