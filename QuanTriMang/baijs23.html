<!-- 
Bài tập JavaScript 23:

Tạo 3 textbox, có tên lần lượt là: SoLuong (Số lượng), DonGia (Đơn giá) và ThanhTien (Thành tiền);

Yêu cầu: Khi người dùng nhập giá trị trong DonGia thì kết quả sẽ được cập nhật ngay trong ThanhTien.

Hướng dẫn: Khi người dùng nhập giá trị trong textbox DonGia bằng cách nhấn các phím số thì sự kiện nhấn phím xuất hiện (sự kiện nhấn phím có tên là onKeyUp), 
do vậy ta sẽ viết các lệnh đáp ứng với sự kiện này. Các lệnh ở đây chỉ có một do vậy nên đặt ngay trong định nghĩa thẻ, như sau:

<html>
<head>
<title>Tinh tich</title>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
</head> 
<body style="font-family:arial;background-color:lavender">
<H1>Bạn hãy nhập vào số lượng và giá:</H1> 
Số lượng: <input name="SoLuong">
Đơn giá:<input name="DonGia" onKeyUp="ThanhTien.value=SoLuong.value*DonGia.value"> <HR>
Thành tiền:<input name="ThanhTien"> USD 
</body>

</html> 
-->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tính tích</title>
</head>

<body style="font-family: arial;background-color:lavender">
    <h1>Bạn hãy nhập vào số lượng và giá:</h1>
    <label for="SoLuong">Số lượng:</label>
    <input type="text" id="SoLuong">
    <label for="DonGia"></label>Đơn giá:</label>
    <input type="text" id="DonGia" onkeyup="ThanhTien.value=SoLuong.value*DonGia.value;">
    <hr>
    <label for="ThanhTien"></label>Thành tiền:</label>
    <input type="text" id="ThanhTien" readonly>USD
</body>

</html>
