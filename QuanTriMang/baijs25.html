<!-- 
Bài tập JavaScript 25: Tạo ra một trang Web đăng nhập vào trang Vinaphone để cho phép người gửi tin nhắn đến điện thoại di động.

hướng dẫn: Để đăng nhập vào một trang Web nào đó, những thông tin bắt buộc thường là UserName và password (mật khẩu). 
Tuy nhiên, ngoài những thông tin bắt buộc đó chúng ta còn phải gửi các thông tin phụ. 
Những thông tin phụ này người dùng người dùng không phải nhập. (các thông tin phụ đó dưới đây sẽ được gạch chân) 
-->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập vào trang Web</title>
</head>

<body style="font-family: arial">
    <h1>Đăng nhập vào trang Quantrimang.com</h1>
    <hr>
    <form action="https://quantrimang.com/account/login" method="post">
        <label for="username">User Name:</label>
        <input type="text" id="username" size="20"><br>
        <label for="password">Password:</label>
        <input type="password" id="password" size="20"><br>
        <input type="hidden" name="id" value="0">
        <input type="hidden" name="language" value="en">
        <input type="submit" value="Đăng nhập - Login">
        </p>
    </form>
</body>

</html>
